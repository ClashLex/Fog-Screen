<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fog Screen — Breath Mirror</title>
<meta name="description" content="An interactive breath-powered fog mirror. Blow to fog the screen, pinch to draw, and capture your art with hand gestures.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000; overflow: hidden;
    width: 100vw; height: 100vh; cursor: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  #container { position: relative; width: 100vw; height: 100vh; }

  video {
    position: absolute; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1); opacity: 0; pointer-events: none;
  }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #cameraCanvas { z-index: 1; }
  #maskCanvas   { z-index: 0; display: none; }
  #blurCanvas   { z-index: 2; }
  #inkCanvas    { z-index: 3; pointer-events: none; }
  #frameCanvas  { z-index: 4; pointer-events: none; }

  /* ── Film grain overlay ── */
  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 90; opacity: 0.12;
    background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.3" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
    mix-blend-mode: overlay;
  }

  /* ── Cinematic vignette ── */
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 80;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
  }

  /* ── Custom cursor — size driven by JS ── */
  #cursor {
    position: fixed; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.05);
    pointer-events: none; z-index: 100;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.12s, width 0.08s, height 0.08s, background 0.08s, border-color 0.08s;
  }
  #cursor.erasing  { background: rgba(255,255,255,0.82); border-color: #fff; }
  #cursor.ink-idle { border-color: rgba(200,130,80,0.7); background: rgba(200,130,80,0.08); }
  #cursor.inking   { background: rgba(200,130,80,0.88); border-color: #fff; }

  /* ── Breath ring ── */
  #breathRing {
    position: fixed; bottom: 118px; left: 50%;
    transform: translateX(-50%) scale(1);
    width: 40px; height: 40px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1);
    z-index: 50; pointer-events: none;
    transition: border-color 0.1s, box-shadow 0.1s, transform 0.15s ease-out;
  }
  #breathRing.active {
    border-color: rgba(210,225,215,0.82);
    box-shadow: 0 0 18px rgba(210,225,215,0.3);
  }

  /* ── Status text ── */
  #status {
    position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.36); font-size: 10.5px; letter-spacing: 0.22em;
    text-transform: uppercase; font-family: 'Cormorant Garamond', Georgia, serif;
    pointer-events: none; white-space: nowrap; z-index: 50; transition: opacity 0.3s;
  }

  /* ── Mode HUD (top left) ── */
  #modeHud {
    position: fixed; top: 20px; left: 20px; z-index: 50; pointer-events: none;
    color: rgba(255,255,255,0.28); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  #modeHud em { color: rgba(255,255,255,0.65); font-style: normal; }

  /* ── Countdown overlay ── */
  #countdown {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 140px; font-family: 'Cormorant Garamond', Georgia, serif;
    color: rgba(255,255,255,0.9); text-shadow: 0 0 40px rgba(255,255,255,0.35);
    pointer-events: none; z-index: 60; opacity: 0; transition: opacity 0.2s;
    font-weight: 300;
  }
  #countdown.show { opacity: 1; }

  /* ── Control buttons (top right) ── */
  #btnGroup {
    position: fixed; top: 18px; right: 18px; z-index: 200;
    display: flex; flex-direction: column; gap: 7px; align-items: flex-end;
  }
  .btn-row { display: flex; gap: 6px; }
  #btnGroup button {
    background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.82); padding: 7px 14px; font-size: 10px;
    letter-spacing: 0.11em; text-transform: uppercase; cursor: pointer;
    border-radius: 3px; font-family: 'Cormorant Garamond', Georgia, serif;
    transition: all 0.12s; backdrop-filter: blur(6px); white-space: nowrap;
  }
  #btnGroup button:hover  { background: rgba(255,255,255,0.16); }
  #btnGroup button:active { transform: scale(0.95); }
  #btnGroup button.lit    { border-color: rgba(255,255,255,0.6); color: #fff; }

  /* ── Photo strip ── */
  #photoStrip {
    position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    z-index: 55; overflow-x: auto;
    background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
  }
  #photoStrip::-webkit-scrollbar { display: none; }
  .photo-thumb {
    position: relative; flex-shrink: 0; height: 62px; border-radius: 3px;
    overflow: hidden; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.22);
    transition: border-color 0.15s, transform 0.15s;
    animation: thumbIn 0.3s ease;
  }
  .photo-thumb:hover { border-color: rgba(255,255,255,0.75); transform: scale(1.05); }
  .photo-thumb img { height: 100%; display: block; }
  .save-btn {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); color: white; font-size: 9.5px;
    letter-spacing: 0.1em; font-family: 'Cormorant Garamond', Georgia, serif;
    text-transform: uppercase; opacity: 0; transition: opacity 0.15s;
  }
  .photo-thumb:hover .save-btn { opacity: 1; }
  @keyframes thumbIn {
    from { opacity: 0; transform: scale(0.8) translateY(8px); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── Flash ── */
  #flash {
    position: fixed; inset: 0; z-index: 500;
    background: white; opacity: 0; pointer-events: none;
  }

  /* ── Welcome overlay ── */
  #welcome {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(20px);
    opacity: 1; transition: opacity 0.6s ease;
  }
  #welcome.hidden { opacity: 0; pointer-events: none; }
  #welcome h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300; font-size: 48px; color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em; margin-bottom: 12px;
  }
  #welcome p {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 40px;
  }
  #welcome .instructions {
    display: flex; gap: 40px; margin-bottom: 48px;
  }
  #welcome .instr-item {
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  #welcome .instr-icon {
    font-size: 28px; margin-bottom: 8px; display: block;
    filter: grayscale(0.2);
  }
  #startBtn {
    background: transparent; border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.85); padding: 14px 48px; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    border-radius: 4px; font-family: 'Cormorant Garamond', Georgia, serif;
    transition: all 0.2s; backdrop-filter: blur(6px);
  }
  #startBtn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.6); }
  #startBtn:active { transform: scale(0.97); }
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome">
  <h1>Fog Screen</h1>
  <p>Breath Mirror Experience</p>
  <div class="instructions">
    <div class="instr-item">
      <span class="instr-icon">💨</span>
      blow to fog
    </div>
    <div class="instr-item">
      <span class="instr-icon">🤏</span>
      pinch to draw
    </div>
    <div class="instr-item">
      <span class="instr-icon">📷</span>
      L-shape to capture
    </div>
  </div>
  <button id="startBtn">Enter</button>
</div>

<!-- Main App -->
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="cameraCanvas"></canvas>
  <canvas id="maskCanvas"></canvas>
  <canvas id="blurCanvas"></canvas>
  <canvas id="inkCanvas"></canvas>
  <canvas id="frameCanvas"></canvas>
</div>
<div class="grain"></div>
<div class="vignette"></div>
<div id="cursor"></div>

<div id="modeHud">mode: <em id="modeLabel">erase</em> &nbsp;|&nbsp; size: <em id="sizeLabel">M</em></div>
<div id="status">initializing…</div>
<div id="breathRing"></div>
<div id="countdown"></div>

<div id="btnGroup">
  <div class="btn-row">
    <button id="undoBtn">↩ undo [z]</button>
    <button id="clearBtn">✕ clear [c]</button>
    <button id="fillBtn">☁ fill [f]</button>
  </div>
  <div class="btn-row">
    <button id="modeBtn">erase [m]</button>
    <button id="s1Btn">S [1]</button>
    <button id="s2Btn" class="lit">M [2]</button>
    <button id="s3Btn">L [3]</button>
  </div>
</div>

<div id="photoStrip"></div>
<div id="flash"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
/* ── Canvas refs ─────────────────────────────────────────────────────── */
const video        = document.getElementById('video');
const cameraCanvas = document.getElementById('cameraCanvas');
const maskCanvas   = document.getElementById('maskCanvas');
const blurCanvas   = document.getElementById('blurCanvas');
const inkCanvas    = document.getElementById('inkCanvas');
const frameCanvas  = document.getElementById('frameCanvas');
const camCtx       = cameraCanvas.getContext('2d');
const maskCtx      = maskCanvas.getContext('2d');
const blurCtx      = blurCanvas.getContext('2d');
const inkCtx       = inkCanvas.getContext('2d');
const frameCtx     = frameCanvas.getContext('2d');

const cursor      = document.getElementById('cursor');
const statusEl    = document.getElementById('status');
const breathRing  = document.getElementById('breathRing');
const flashEl     = document.getElementById('flash');
const countdownEl = document.getElementById('countdown');
const photoStrip  = document.getElementById('photoStrip');
const modeLabel   = document.getElementById('modeLabel');
const sizeLabel   = document.getElementById('sizeLabel');
const welcomeEl   = document.getElementById('welcome');

const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d');

let W = 0, H = 0, fogReady = false;

/* ── State ─────────────────────────────────────────────────────────── */
let mode     = 'erase';      // 'erase' | 'ink'
let brushKey = 'M';          // 'S' | 'M' | 'L'

const ERASE_SZ = { S: 18, M: 40, L: 70 };
const INK_SZ   = { S: 10, M: 22, L: 38 };
const INK_COL  = '#0c0a09';

// Per-hand tracking state (up to 2 hands)
const handState = [0, 1].map(() => ({
  smoothX: null, smoothY: null, trail: [], isDrawing: false
}));

/* ── Welcome Screen ─────────────────────────────────────────────────── */
document.getElementById('startBtn').addEventListener('click', () => {
  welcomeEl.classList.add('hidden');
  setTimeout(() => { welcomeEl.style.display = 'none'; }, 600);
  startCamera();
  startMic();
});

/* ── Resize ─────────────────────────────────────────────────────────── */
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  [cameraCanvas, maskCanvas, blurCanvas, inkCanvas, frameCanvas].forEach(c => {
    c.width = W; c.height = H;
  });
  offscreen.width = W; offscreen.height = H;
}
window.addEventListener('resize', resize);

/* ── Cursor ──────────────────────────────────────────────────────────── */
function updateCursor() {
  const sz = (mode === 'ink' ? INK_SZ : ERASE_SZ)[brushKey];
  cursor.style.width  = sz + 'px';
  cursor.style.height = sz + 'px';
}

/* ── Render loop ─────────────────────────────────────────────────────── */
function render() {
  requestAnimationFrame(render);
  if (video.readyState < 2) return;

  // Live mirrored webcam on cameraCanvas
  camCtx.save(); camCtx.translate(W, 0); camCtx.scale(-1, 1);
  camCtx.drawImage(video, 0, 0, W, H); camCtx.restore();

  // Offscreen: blurred + warm fog tint
  offCtx.save();
  offCtx.filter = 'blur(15px) brightness(1.04)';
  offCtx.translate(W, 0); offCtx.scale(-1, 1);
  offCtx.drawImage(video, 0, 0, W, H); offCtx.restore();
  offCtx.fillStyle = 'rgba(212, 222, 215, 0.32)';  // warm-cool fog tint
  offCtx.fillRect(0, 0, W, H);

  // Composite blurred image through fog mask onto blurCanvas
  blurCtx.clearRect(0, 0, W, H);
  blurCtx.drawImage(offscreen, 0, 0);
  blurCtx.globalCompositeOperation = 'destination-in';
  blurCtx.drawImage(maskCanvas, 0, 0);
  blurCtx.globalCompositeOperation = 'source-over';

  // ── Natural fog evaporation ──────────────────────────────────────
  // Exponential decay: alpha *= 0.999 per frame → ~50s to near-zero
  maskCtx.save();
  maskCtx.globalCompositeOperation = 'destination-out';
  maskCtx.fillStyle = 'rgba(0,0,0,0.001)';
  maskCtx.fillRect(0, 0, W, H);
  maskCtx.restore();
  maskCtx.globalCompositeOperation = 'source-over';
}

/* ── Add fog (from mic or fill) ─────────────────────────────────────── */
let breathCooldown = 0;
function addFog(volume) {
  if (breathCooldown > 0) { breathCooldown--; return; }
  fogReady = true;
  for (let i = 0; i < 3 + Math.floor(Math.random() * 3); i++) {
    const cx = W * 0.5 + (Math.random() - 0.5) * W * 0.65;
    const cy = H * 0.5 + (Math.random() - 0.5) * H * 0.3;
    const r  = 100 + Math.random() * 200 + volume * 550;
    const a  = Math.min(1, 0.38 + volume * 3.5);
    const g  = maskCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0,   `rgba(255,255,255,${a})`);
    g.addColorStop(0.5, `rgba(255,255,255,${a * 0.6})`);
    g.addColorStop(1,   'rgba(255,255,255,0)');
    maskCtx.save();
    maskCtx.globalCompositeOperation = 'source-over';
    maskCtx.fillStyle = g;
    maskCtx.beginPath(); maskCtx.arc(cx, cy, r, 0, Math.PI * 2); maskCtx.fill();
    maskCtx.restore();
  }
  breathCooldown = 4;
  if (!countingDown) statusEl.textContent = 'pinch to draw';
}

function fillFog() {
  fogReady = true;
  maskCtx.save();
  maskCtx.globalCompositeOperation = 'source-over';
  const g = maskCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.85);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.7, 'rgba(255,255,255,0.95)');
  g.addColorStop(1,   'rgba(255,255,255,0.7)');
  maskCtx.fillStyle = g; maskCtx.fillRect(0, 0, W, H);
  maskCtx.restore();
  if (!countingDown) statusEl.textContent = 'pinch to draw';
}

/* ── Smooth trail helper ─────────────────────────────────────────────── */
const SMOOTH_K = 0.35;
function pushTrail(state, rawX, rawY) {
  if (state.smoothX === null) { state.smoothX = rawX; state.smoothY = rawY; }
  state.smoothX += SMOOTH_K * (rawX - state.smoothX);
  state.smoothY += SMOOTH_K * (rawY - state.smoothY);
  state.trail.push({ x: state.smoothX, y: state.smoothY });
  if (state.trail.length > 7) state.trail.shift();
}

function strokeTrail(ctx, trail) {
  if (trail.length < 2) return;
  ctx.beginPath();
  ctx.moveTo((trail[0].x + trail[1].x) / 2, (trail[0].y + trail[1].y) / 2);
  for (let i = 1; i < trail.length - 1; i++) {
    ctx.quadraticCurveTo(
      trail[i].x, trail[i].y,
      (trail[i].x + trail[i + 1].x) / 2, (trail[i].y + trail[i + 1].y) / 2
    );
  }
  ctx.lineTo(trail[trail.length - 1].x, trail[trail.length - 1].y);
  ctx.stroke();
}

/* ── Erase fog stroke ─────────────────────────────────────────────────── */
function eraseAt(state, rawX, rawY) {
  pushTrail(state, rawX, rawY);
  maskCtx.save();
  maskCtx.globalCompositeOperation = 'destination-out';
  maskCtx.strokeStyle = 'rgba(0,0,0,1)';
  maskCtx.lineWidth   = ERASE_SZ[brushKey];
  maskCtx.lineCap = 'round'; maskCtx.lineJoin = 'round';
  strokeTrail(maskCtx, state.trail);
  maskCtx.restore();
}

/* ── Hover fog push (gentle breath when not pinching) ─────────────────── */
function hoverPush(x, y) {
  if (mode !== 'erase' || !fogReady) return;
  const r = ERASE_SZ[brushKey] * 2.5;
  maskCtx.save();
  maskCtx.globalCompositeOperation = 'destination-out';
  const g = maskCtx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0,   'rgba(0,0,0,0.035)');
  g.addColorStop(0.5, 'rgba(0,0,0,0.012)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  maskCtx.fillStyle = g;
  maskCtx.beginPath(); maskCtx.arc(x, y, r, 0, Math.PI * 2); maskCtx.fill();
  maskCtx.restore();
}

/* ── Ink stroke ──────────────────────────────────────────────────────── */
function inkAt(state, rawX, rawY) {
  pushTrail(state, rawX, rawY);
  inkCtx.save();
  inkCtx.strokeStyle = INK_COL;
  inkCtx.lineWidth   = INK_SZ[brushKey];
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.shadowColor = 'rgba(0,0,0,0.3)'; inkCtx.shadowBlur = 3;
  strokeTrail(inkCtx, state.trail);
  inkCtx.restore();
}

function resetHand(state) {
  state.smoothX = null; state.smoothY = null;
  state.trail = []; state.isDrawing = false;
}

/* ── Undo — covers mask + ink together ──────────────────────────────── */
let undoStack = [];
function saveSnapshot() {
  undoStack.push({
    mask: maskCtx.getImageData(0, 0, W, H),
    ink:  inkCtx.getImageData(0, 0, W, H)
  });
  if (undoStack.length > 15) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  maskCtx.putImageData(s.mask, 0, 0);
  inkCtx.putImageData(s.ink,  0, 0);
}

/* ── Photo capture ───────────────────────────────────────────────────── */
const HOLD_MS = 1500;
let holdStart = null, countingDown = false, countTimer = null;

function isLShape(lm) {
  return lm[8].y < lm[6].y &&
         Math.abs(lm[4].x - lm[2].x) > 0.04 &&
         lm[12].y > lm[10].y &&
         lm[16].y > lm[14].y;
}

function drawCaptureFrame(lm1, lm2, progress) {
  frameCtx.clearRect(0, 0, W, H);
  const x1 = (1 - lm1[8].x) * W, y1 = lm1[8].y * H;
  const x2 = (1 - lm2[8].x) * W, y2 = lm2[8].y * H;
  const left = Math.min(x1, x2), right = Math.max(x1, x2);
  const top  = Math.min(y1, y2), bottom = top + (right - left) * 0.75;
  const cLen = (right - left) * 0.18;
  frameCtx.strokeStyle = `rgba(255,255,255,${0.42 + progress * 0.58})`;
  frameCtx.lineWidth = 1.5 + progress * 2; frameCtx.lineCap = 'square';
  [
    [left,  top+cLen,  left,  top,  left+cLen,  top],
    [right-cLen, top,  right, top,  right, top+cLen],
    [left,  bottom-cLen, left, bottom, left+cLen, bottom],
    [right-cLen, bottom, right, bottom, right, bottom-cLen]
  ].forEach(([x1,y1,x2,y2,x3,y3]) => {
    frameCtx.beginPath();
    frameCtx.moveTo(x1,y1); frameCtx.lineTo(x2,y2); frameCtx.lineTo(x3,y3);
    frameCtx.stroke();
  });
}

function startCountdown() {
  countingDown = true; let count = 3;
  countdownEl.textContent = count; countdownEl.classList.add('show');
  statusEl.textContent = 'get ready…';
  countTimer = setInterval(() => {
    if (--count > 0) { countdownEl.textContent = count; }
    else {
      clearInterval(countTimer); countdownEl.classList.remove('show');
      countdownEl.textContent = ''; countingDown = false; doCapture();
    }
  }, 1000);
}

function doCapture() {
  flashEl.style.transition = 'none'; flashEl.style.opacity = '0.88';
  setTimeout(() => { flashEl.style.transition = 'opacity 0.35s'; flashEl.style.opacity = '0'; }, 80);

  const snap = document.createElement('canvas');
  snap.width = W; snap.height = H;
  const sCtx = snap.getContext('2d');
  sCtx.drawImage(cameraCanvas, 0, 0);   // clear webcam
  sCtx.drawImage(blurCanvas,   0, 0);   // fog layer
  sCtx.drawImage(inkCanvas,    0, 0);   // ink strokes

  snap.toBlob(blob => {
    const url  = URL.createObjectURL(blob);
    const wrap = document.createElement('div'); wrap.className = 'photo-thumb';
    const img  = document.createElement('img'); img.src = url;
    const btn  = document.createElement('div'); btn.className = 'save-btn'; btn.textContent = '↓ save';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const a = document.createElement('a');
      a.href = url; a.download = `fogscreen-${Date.now()}.png`; a.click();
    });
    wrap.appendChild(img); wrap.appendChild(btn);
    photoStrip.appendChild(wrap);
    wrap.scrollIntoView({ behavior: 'smooth', inline: 'end' });
    frameCtx.clearRect(0, 0, W, H); holdStart = null;
    statusEl.textContent = fogReady ? 'pinch to draw' : 'blow on the screen';
  }, 'image/png');
}

/* ── MediaPipe Hands ─────────────────────────────────────────────────── */
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.62, minTrackingConfidence: 0.5 });

hands.onResults(results => {
  const all = results.multiHandLandmarks || [];

  // Reset slots beyond detected count
  for (let i = all.length; i < 2; i++) resetHand(handState[i]);

  if (!countingDown) {
    if (all.length === 0) { cursor.style.opacity = '0'; }

    let anyPinching = false;

    all.forEach((lm, idx) => {
      if (idx >= 2) return;
      const state = handState[idx];
      const fx = (1 - lm[8].x) * W, fy = lm[8].y * H;  // index tip (mirrored)
      const tx = (1 - lm[4].x) * W, ty = lm[4].y * H;  // thumb tip (mirrored)
      const pinching = Math.hypot(fx - tx, fy - ty) < W * 0.055;

      // Move cursor to primary hand
      if (idx === 0) {
        cursor.style.left = fx + 'px'; cursor.style.top = fy + 'px'; cursor.style.opacity = '1';
        if (pinching) {
          cursor.className = mode === 'ink' ? 'inking' : 'erasing';
        } else {
          cursor.className = mode === 'ink' ? 'ink-idle' : '';
        }
      }

      if (pinching && (fogReady || mode === 'ink')) {
        anyPinching = true;
        holdStart = null; frameCtx.clearRect(0, 0, W, H);
        if (!state.isDrawing) { saveSnapshot(); state.isDrawing = true; }
        if (mode === 'erase') eraseAt(state, fx, fy);
        else                  inkAt(state, fx, fy);
      } else {
        // Hover: gently push fog away from finger tip
        if (idx === 0 && fogReady) hoverPush(fx, fy);
        if (state.isDrawing) resetHand(state);
        else { state.trail = []; state.smoothX = null; state.smoothY = null; }
      }
    });

    if (anyPinching) {
      statusEl.textContent = mode === 'erase' ? 'erasing fog…' : 'inking…';
      return;
    }
  }

  // ── Capture gesture: both hands L-shape ──────────────────────────
  if (!countingDown) {
    const bothL = all.length === 2 && isLShape(all[0]) && isLShape(all[1]);
    if (bothL) {
      if (!holdStart) holdStart = Date.now();
      const elapsed = Date.now() - holdStart;
      drawCaptureFrame(all[0], all[1], Math.min(elapsed / HOLD_MS, 1));
      statusEl.textContent = '📷 hold…';
      if (elapsed >= HOLD_MS) { holdStart = null; frameCtx.clearRect(0, 0, W, H); startCountdown(); }
    } else {
      if (holdStart) { holdStart = null; frameCtx.clearRect(0, 0, W, H); }
      if (!fogReady) statusEl.textContent = 'blow on the screen';
      else if (all.length >= 1) statusEl.textContent = 'pinch to draw';
      else statusEl.textContent = 'blow on the screen';
    }
  }
});

/* ── Camera ──────────────────────────────────────────────────────────── */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream; await video.play();
    const mpCam = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280, height: 720
    });
    mpCam.start(); resize(); render();
    statusEl.textContent = 'blow on the screen';
  } catch(e) { statusEl.textContent = 'camera access needed'; }
}

/* ── Mic: breath detection ───────────────────────────────────────────── */
async function startMic() {
  try {
    const ms  = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ac  = new AudioContext();
    const src = ac.createMediaStreamSource(ms);
    const hp  = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 800;
    src.connect(hp);
    const an  = ac.createAnalyser(); an.fftSize = 512; hp.connect(an);
    const buf = new Float32Array(an.frequencyBinCount);
    let rTO   = null;
    (function tick() {
      requestAnimationFrame(tick);
      an.getFloatTimeDomainData(buf);
      let s = 0; for (const v of buf) s += v * v;
      const rms = Math.sqrt(s / buf.length);
      if (rms > 0.014) {
        addFog(rms);
        // Scale breath ring proportional to breath volume
        const scale = 1 + Math.min(rms * 10, 0.65);
        breathRing.style.transform = `translateX(-50%) scale(${scale})`;
        breathRing.classList.add('active');
        clearTimeout(rTO);
        rTO = setTimeout(() => {
          breathRing.classList.remove('active');
          breathRing.style.transform = 'translateX(-50%) scale(1)';
        }, 280);
      }
    })();
  } catch(e) { /* mic unavailable — ☁ fill button still works */ }
}

/* ── Mode + size controls ────────────────────────────────────────────── */
function setMode(m) {
  mode = m;
  modeLabel.textContent = m;
  document.getElementById('modeBtn').textContent = m + ' [m]';
  updateCursor();
}

function setSize(k) {
  brushKey = k;
  sizeLabel.textContent = k;
  ['S','M','L'].forEach(s => {
    document.getElementById('s'+{'S':'1','M':'2','L':'3'}[s]+'Btn').classList.toggle('lit', s === k);
  });
  updateCursor();
}

document.getElementById('modeBtn').addEventListener('click', () => setMode(mode === 'erase' ? 'ink' : 'erase'));
document.getElementById('s1Btn').addEventListener('click', () => setSize('S'));
document.getElementById('s2Btn').addEventListener('click', () => setSize('M'));
document.getElementById('s3Btn').addEventListener('click', () => setSize('L'));
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('fillBtn').addEventListener('click', fillFog);
document.getElementById('clearBtn').addEventListener('click', () => {
  maskCtx.clearRect(0, 0, W, H);
  inkCtx.clearRect(0, 0, W, H);
  undoStack = []; fogReady = false;
  handState.forEach(resetHand);
  statusEl.textContent = 'blow on the screen';
});

/* ── Keyboard ────────────────────────────────────────────────────────── */
window.addEventListener('keydown', e => {
  switch (e.key.toLowerCase()) {
    case 'z': undo(); break;
    case 'c':
      maskCtx.clearRect(0, 0, W, H); inkCtx.clearRect(0, 0, W, H);
      undoStack = []; fogReady = false; handState.forEach(resetHand);
      statusEl.textContent = 'blow on the screen'; break;
    case 'f': fillFog(); break;
    case 'm': setMode(mode === 'erase' ? 'ink' : 'erase'); break;
    case '1': setSize('S'); break;
    case '2': setSize('M'); break;
    case '3': setSize('L'); break;
  }
});

/* ── Boot ────────────────────────────────────────────────────────────── */
updateCursor();
</script>
